
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup to my Newsletter</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="/images/favicon.png" type="image/png">
</head>
<body>
    <div class="container">
        <img src="/images/gma_logo.png" alt="gma_logo" width="50" height="50">
        <h1>Signup to my Newsletter!!!</h1>
        <form action="/" method="post">
            <div class="form-input">
                <input type="text" placeholder="Enter your first name" name="fName" required><br>
                <input type="text" placeholder="Enter your last name" name="lName" required><br>
                <input type="email" placeholder="Enter your email" name="userEmail" required><br>
            </div>
            <button type="submit">Sign Me Up</button>
            <!-- <p class="footer">&copy; 2026 GMA Productions</p> -->
             <p class="footer">
                &copy; <span id="year"></span> GMA Productions
             </p>
        </form>
    </div>
    
</body>
</html>
